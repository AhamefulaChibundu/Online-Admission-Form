<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Online Admission Form</h2>

    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <form id="multiStepForm">

        <!-- Step 1: Personal Info -->
        <div class="form-step active">
            <h3>Personal Details</h3>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter full name" required>
            <div class="error-message"></div>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" title="Enter a valid email" required>
            <div class="error-message"></div>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+234..." required>
            <div class="error-message"></div>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
            <div class="error-message"></div>

            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 2: Education -->
        <div class="form-step">
            <h3>Educational Background</h3>

            <label for="school">School Name</label>
            <input type="text" id="school" name="school" placeholder="Enter school name" required>
            <div class="error-message"></div>

            <label for="qualification">Qualification</label>
            <input type="text" id="qualification" name="qualification" placeholder="Enter qualification" required>
            <div class="error-message"></div>

            <label for="year">Year of Graduation</label>
            <input type="number" id="year" name="year" placeholder="YYYY" required>
            <div class="error-message"></div>

            <button type="button" class="prev-btn">Back</button>
            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 3: Guardian Info -->
        <div class="form-step">
            <h3>Guardian Information</h3>

            <label for="guardian">Guardian Name</label>
            <input type="text" id="guardian" name="guardian" placeholder="Enter guardian name" required>
            <div class="error-message"></div>

            <label for="guardianPhone">Guardian Phone</label>
            <input type="tel" id="guardianPhone" name="guardianPhone" placeholder="+234..." required>
            <div class="error-message"></div>

            <button type="button" class="prev-btn">Back</button>
            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 4: Confirmation -->
        <div class="form-step">
            <h2>Confirm Your Details</h2>
            <div id="summary"></div>

            <div class="buttons">
                <button type="button" class="prev-btn">Back</button>
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
